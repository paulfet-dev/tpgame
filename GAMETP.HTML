<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Phrase Carousel Duel</title>
    <style>
        :root {
            --p1-color: #ff6b6b;
            --p2-color: #4ecdc4;
            --bg-color: #f7f9fc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Carousel Styling */
        #carousel-container {
            width: 100%;
            height: 120px;
            background: #2d3436;
            overflow: hidden;
            position: relative;
            border-bottom: 5px solid #fdcb6e;
            display: flex;
            align-items: center;
        }

        .carousel-track {
            display: flex;
            position: absolute;
            white-space: nowrap;
            will-change: transform;
        }

        .time-tile {
            display: inline-block;
            padding: 20px 40px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            background: #636e72;
            margin: 0 10px;
            border-radius: 10px;
            border: 2px solid #b2bec3;
            user-select: none;
        }

        /* Game Arena */
        #game-arena {
            display: flex;
            width: 100%;
            height: calc(100vh - 120px);
        }

        .player-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-right: 2px dashed #dfe6e9;
        }

        .p1-zone { background-color: rgba(255, 107, 107, 0.05); }
        .p2-zone { background-color: rgba(78, 205, 196, 0.05); }

        h2 { margin-bottom: 10px; }
        .score { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }

        .phrase-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .phrase-btn {
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            color: white;
            font-weight: bold;
        }

        .p1-btn { background-color: var(--p1-color); }
        .p2-btn { background-color: var(--p2-color); }

        .phrase-btn:active { transform: scale(0.95); }
        .phrase-btn.disabled { background-color: #b2bec3; cursor: default; opacity: 0.5; pointer-events: none;}

        .instruction {
            position: fixed;
            bottom: 10px;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="carousel-container">
    <div class="carousel-track" id="track">
        </div>
</div>

<div id="game-arena">
    <div class="player-zone p1-zone">
        <h2 style="color: var(--p1-color)">Player 1</h2>
        <div class="score" id="p1-score">Score: 0</div>
        <div class="phrase-grid" id="p1-phrases"></div>
    </div>

    <div class="player-zone p2-zone">
        <h2 style="color: var(--p2-color)">Player 2</h2>
        <div class="score" id="p2-score">Score: 0</div>
        <div class="phrase-grid" id="p2-phrases"></div>
    </div>
</div>

<div class="instruction">Click a Time Phrase, then quickly click the matching Digital Time in the moving carousel!</div>

<script>
    const timeData = [
        { digital: "4:15", phrase: "It's quarter past 4" },
        { digital: "3:45", phrase: "It's quarter to 4" },
        { digital: "6:30", phrase: "It's half past 6" },
        { digital: "7:00", phrase: "It's seven o'clock" },
        { digital: "1:30", phrase: "It's half past 1" },
        { digital: "10:15", phrase: "It's quarter past 10" },
        { digital: "12:45", phrase: "It's quarter to 1" },
        { digital: "5:00", phrase: "It's five o'clock" },
        { digital: "9:30", phrase: "It's half past 9" },
        { digital: "2:15", phrase: "It's quarter past 2" }
    ];

    let p1Selected = null;
    let p2Selected = null;
    let scores = { p1: 0, p2: 0 };

    // Audio Context for the chime (no external files needed)
    function playChime() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1); // A5
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    }

    // Initialize Carousel
    const track = document.getElementById('track');
    const combinedTimes = [...timeData, ...timeData]; // Double for seamless loop
    combinedTimes.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'time-tile';
        div.textContent = item.digital;
        div.onclick = () => checkMatch(item.digital);
        track.appendChild(div);
    });

    // Carousel Animation
    let posX = 0;
    function animate() {
        posX -= 2; // Speed of carousel
        if (Math.abs(posX) >= track.scrollWidth / 2) {
            posX = 0;
        }
        track.style.transform = `translateX(${posX}px)`;
        requestAnimationFrame(animate);
    }
    animate();

    // Initialize Phrases for both players
    function setupPhrases(playerId) {
        const container = document.getElementById(`${playerId}-phrases`);
        timeData.forEach((item) => {
            const btn = document.createElement('button');
            btn.className = `phrase-btn ${playerId}-btn`;
            btn.textContent = item.phrase;
            btn.onclick = () => {
                // Clear previous selection highlight
                document.querySelectorAll(`.${playerId}-btn`).forEach(b => b.style.border = "none");
                btn.style.border = "4px solid #2d3436";
                if(playerId === 'p1') p1Selected = item;
                else p2Selected = item;
            };
            container.appendChild(btn);
        });
    }

    function checkMatch(digitalTime) {
        // Check Player 1
        if (p1Selected && p1Selected.digital === digitalTime) {
            handleCorrect('p1', p1Selected.phrase);
            p1Selected = null;
        }
        // Check Player 2
        if (p2Selected && p2Selected.digital === digitalTime) {
            handleCorrect('p2', p2Selected.phrase);
            p2Selected = null;
        }
    }

    function handleCorrect(player, phraseText) {
        playChime();
        scores[player]++;
        document.getElementById(`${player}-score`).textContent = `Score: ${scores[player]}`;
        
        // Disable the matched phrase button for that player
        const buttons = document.querySelectorAll(`.${player}-btn`);
        buttons.forEach(btn => {
            if (btn.textContent === phraseText) {
                btn.classList.add('disabled');
                btn.style.border = "none";
            }
        });

        if (scores[player] === timeData.length) {
            alert(`${player === 'p1' ? 'Player 1' : 'Player 2'} Wins!`);
            location.reload();
        }
    }

    setupPhrases('p1');
    setupPhrases('p2');
</script>

</body>
</html>
